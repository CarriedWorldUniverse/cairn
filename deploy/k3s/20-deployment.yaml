apiVersion: apps/v1
kind: Deployment
metadata:
  name: cairn
  namespace: cwb
  labels:
    app: cairn
spec:
  replicas: 1
  strategy:
    type: Recreate            # single PVC; no rolling (RWO + on-disk repos)
  selector:
    matchLabels:
      app: cairn
  template:
    metadata:
      labels:
        app: cairn
    spec:
      containers:
        - name: cairn
          image: localhost/cairn:dev
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8100
            - name: grpc
              containerPort: 8102
            - name: ssh
              containerPort: 2222
          env:
            - name: CAIRN_HTTP_ADDR
              value: ":8100"
            # gRPC JSON API behind interchange (mTLS); git stays on :8100/SSH.
            - name: CAIRN_GRPC_ADDR
              value: ":8102"
            - name: CAIRN_SSH_ADDR
              value: ":2222"
            - name: CAIRN_DB
              value: "/var/lib/nexus/cairn.db"
            - name: CAIRN_REPO_ROOT
              value: "/var/lib/nexus/repos"
            # herald gRPC for the SSH-path by-fingerprint lookup over mTLS
            # (Phase 4) — dialed directly in-cluster with the cwb-ca client cert
            # (CAIRN_TLS_* below); the SSH flow has a pubkey, not a token.
            - name: HERALD_GRPC_ADDR
              value: "herald.cwb.svc:8098"
            # gRPC address for the ledger client (PR-as-issue, Phase 2).
            # cairn uses mTLS with cairn-client-tls when dialling this address.
            - name: LEDGER_GRPC_ADDR
              value: "ledger.cwb.svc:8081"
            - name: CAIRN_TLS_CERT
              value: "/etc/cwb/tls/tls.crt"
            - name: CAIRN_TLS_KEY
              value: "/etc/cwb/tls/tls.key"
            - name: CAIRN_TLS_CA
              value: "/etc/cwb/tls/ca.crt"
            - name: CAIRN_HOST_KEY
              valueFrom:
                secretKeyRef:
                  name: cairn-secrets
                  key: ssh_host_key
          volumeMounts:
            - name: data
              mountPath: /var/lib/nexus
            - name: tls
              mountPath: /etc/cwb/tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cairn-data
        - name: tls
          secret:
            secretName: cairn-client-tls
