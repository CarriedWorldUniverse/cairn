apiVersion: v1
kind: Service
metadata:
  name: cairn
  namespace: cwb
  labels:
    app: cairn
spec:
  type: ClusterIP
  selector:
    app: cairn
  ports:
    - name: http
      port: 8100
      targetPort: http
      protocol: TCP
    # gRPC JSON API (mTLS) — interchange dials cairn.cwb.svc:8102.
    - name: grpc
      port: 8102
      targetPort: grpc
      protocol: TCP
