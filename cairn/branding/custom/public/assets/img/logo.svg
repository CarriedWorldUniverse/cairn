<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Cairn">
  <title>Cairn</title>
  <!-- Three stacked stones, slight horizontal offsets, each placed by a different hand.
       Single flat colour on transparent background. Renders cleanly at 16x16. -->
  <g fill="#5c80a8">
    <rect x="6"  y="22" width="22" height="5" rx="1"/>
    <rect x="9"  y="14" width="17" height="5" rx="1"/>
    <rect x="11" y="6"  width="12" height="5" rx="1"/>
  </g>
</svg>
